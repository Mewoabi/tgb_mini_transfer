# ============================================================
# MiniTransfer — Orchestration des services
# ------------------------------------------------------------
# `docker compose up --build` démarre l'ensemble (MongoDB + API backend) en une étape.
# ============================================================

services:
  mongodb:
    image: mongo:7
    container_name: minitransfer-mongo
    restart: unless-stopped
    # --replSet rs0 : mode replica set (nécessaire aux transactions multi-documents).
    # --bind_ip_all : accepte les connexions des autres conteneurs et de l'hôte.
    # --port 27018 : évite un éventuel MongoDB local déjà présent sur 27017 (fréquent sous Windows).
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27018"]
    ports:
      - "27018:27018"
    volumes:
      - mongo_data:/data/db
    # Initialise le replica set au premier démarrage (idempotent). Le membre est annoncé sous le
    # nom de service « mongodb », résolu par le DNS Docker depuis le backend comme depuis ce nœud.
    healthcheck:
      test: >
        mongosh --port 27018 --quiet --eval "
          try { rs.status().ok }
          catch (e) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongodb:27018' }] }).ok }
        "
      interval: 5s
      timeout: 30s
      start_period: 5s
      retries: 30

  backend:
    build: ./backend
    container_name: minitransfer-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      # Le backend joint MongoDB par son nom de service « mongodb » sur le réseau Docker.
      MONGODB_URI: mongodb://mongodb:27018/minitransfer?replicaSet=rs0
      JWT_SECRET: ${JWT_SECRET:-dev-secret-a-remplacer-par-une-valeur-aleatoire-de-256-bits-0123456789}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}

volumes:
  mongo_data:
